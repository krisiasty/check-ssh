version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
  

archives:
  - format: binary

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "snapshot"

env_files:
  github_token: ~/.config/goreleaser/github_token