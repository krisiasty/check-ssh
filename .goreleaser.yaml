version: 2

project_name: check-ssh

builds:
  - id: darwin
    binary: check-ssh
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
  - id: others
    binary: check-ssh
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

upx:
  - enabled: true
    compress: best
    lzma: true

archives:
  - id: binaries
    formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: archives
    builds:
      - darwin
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - name: check-ssh
    ids:
      - archives
    homepage: "https://github.com/krisiasty/check-ssh"
    description: "Audits sshd for weak or insecure algorithms across local, file-based, and remote scans, and generates a drop-in hardening config."
    license: "Apache-2.0"
    repository:
      owner: krisiasty
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    install: |
      bin.install "check-ssh"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  abbrev: 8
  format: "- [{{ .SHA }}](https://github.com/krisiasty/check-ssh/commit/{{ .SHA }}) {{ .Message }}"
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  prerelease: "{{ .IsV0 }}"
