name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 8 * * 1"  # weekly on monday — catches new vulnerabilities

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go mod verify
        run: go mod verify

      - name: go build
        run: go build ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: -v

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -test ./...

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

      - name: typos
        uses: crate-ci/typos@v1
